<div class="card p-16">
    <div class="flex justify-between ">
        <h1 class=" text-2xl ">Brands List</h1>
        <button pButton severity="primary" type="button"  routerLink="/brand-form"> add Brand</button>
    </div>
    <p-table #dt2 [value]="Brands" dataKey="id" [rows]="10" [rowsPerPageOptions]="[5, 10, 20]"
        [loading]="loading" [paginator]="true"
        [globalFilterFields]="['name', '_id']"
        [tableStyle]="{ 'min-width': '75rem' }">

        <ng-template #caption>
            <div class="flex">
                <p-iconfield iconPosition="left" class="ml-auto">
                    <p-inputicon>
                        <i class="pi pi-search"></i>
                    </p-inputicon>
                    <input pInputText type="text" (input)="applyfilterGlobal($event, 'contains')"
                        placeholder="Search keyword" />
                </p-iconfield>
            </div>
        </ng-template>

        <ng-template #header>
            <tr>
                <th pSortableColumn="name" style="width:20%">
                    <div class="flex items-center gap-2">
                        Name
                        <p-sortIcon field="code" />
                    </div>
                </th>
                <th pSortableColumn="brand.name" style="width:20%">
                    <div class="flex items-center gap-2">
                        ID
                        <p-sortIcon field="code" />
                    </div>
                </th>
                
                
            </tr>
        </ng-template>
        <ng-template #body let-product>
            <tr>
                <td>{{ product.name }}</td>
                <td>{{ product._id }}</td>
                
            </tr>
        </ng-template>
    </p-table>
</div>
