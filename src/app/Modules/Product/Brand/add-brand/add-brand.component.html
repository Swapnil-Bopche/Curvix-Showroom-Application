<p-toast />

<div class="card mt-20 p-10 shadow-xl mx-auto w-[850px]">
    <h1 class="text-2xl text-center">Add Brand</h1>
    <div class="flex justify-center">
        <form [formGroup]="BrandForm"  class="">
            <div class="grid grid-cols-2 gap-8 my-5">
                <div class="flex flex-col gap-1">
                    <input pInputText type="text" id="name" placeholder="Brandname" formControlName="name"
                        [invalid]="isInvalid('name')" />
                    @if (isInvalid('name')) {
                    <p-message severity="error" size="small" variant="simple">Brandname is required.</p-message>
                    }
                </div>
                
            </div>
            
            
            
            <div>
                <button pButton class="mt-2" severity="primary" (click)="SubmitBrand()" type="submit">Add Brand</button>
            </div>
        </form>
    </div>
</div>
